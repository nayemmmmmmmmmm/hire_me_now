<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skill Quiz — HireMeNow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="../assets/css/base.css" />
    <link rel="stylesheet" href="./quiz.css" />
  </head>

  <body>
    <nav class="navbar">
      <a href="../freelancer/freelancer-dashboard.html" class="nav-logo"
        >HireMeNow</a
      >
      <div class="nav-right" id="nav-right">
        <button
          class="theme-toggle-btn"
          id="theme-toggle"
          aria-label="Toggle theme"
        ></button>
      </div>
    </nav>
    <div class="quiz-page">
      <div class="quiz-container">
        <div class="quiz-header">
          <div class="quiz-title-label">Skill Assessment</div>
          <div class="quiz-skill-name">HTML/CSS Fundamentals</div>
          <div class="progress-bar-wrapper">
            <div class="progress-bar-fill" style="width: 20%"></div>
          </div>
          <div class="progress-label">Question 1 of 5</div>
        </div>

        <div class="question-card">
          <div class="question-text">What does CSS stand for?</div>
          <div class="options-list">
            <button class="option-btn">
              <span class="option-key">A</span>
              Computer Style Sheets
            </button>
            <button class="option-btn">
              <span class="option-key">B</span>
              Creative Style Sheets
            </button>
            <button class="option-btn selected">
              <span class="option-key">C</span>
              Cascading Style Sheets
            </button>
            <button class="option-btn">
              <span class="option-key">D</span>
              Colorful Style Sheets
            </button>
          </div>
          <div class="question-nav">
            <button class="btn-next">Next Question</button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
